specification: API Commons Rate Limits
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/RateLimits
provider: Nansen
providerId: nansen
created: '2026-05-08'
modified: '2026-05-08'
reconciled: true
tags:
  - Crypto
  - On-Chain
  - Rate Limiting
description: >-
  Nansen documents per-API-key rate limits of 20 requests per second and 300 requests per minute
  on the Standard API plan. Higher Enterprise contracts raise these caps. Throttled requests
  return HTTP 429.
sources:
  - https://docs.nansen.ai/getting-started/rate-limits
responseCodes:
  throttled: 429
limits:
  - name: Standard API per-second
    scope: api_key
    metric: requests_per_second
    limit: 20
  - name: Standard API per-minute
    scope: api_key
    metric: requests_per_minute
    limit: 300
  - name: Enterprise API
    scope: api_key
    metric: requests_per_second
    limit: -1
    notes: Custom limit per contract.
policies:
  - name: Backoff Strategy
    description: Honor 429 Retry-After and apply exponential backoff with jitter.
maintainers:
  - FN: Kin Lane
    email: kin@apievangelist.com
