specification: API Commons Plans
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/Plans
provider: Nansen
providerId: nansen
created: '2026-05-08'
modified: '2026-05-08'
reconciled: false
tags:
  - Crypto
  - On-Chain
  - Plans
description: >-
  Nansen publishes Studio plans (Pioneer, Standard, Trader, Vision) and a separate API plan for
  programmatic access. API access is paid-only; tiers are gated by per-second / per-minute rate
  limits and feature scope. Public pricing page was rate-limited during research.
notes: Plans partially reconciled - public Nansen pricing page returned 429 during research.
sources:
  - https://www.nansen.ai/pricing
  - https://docs.nansen.ai/getting-started/rate-limits
plans:
  - id: nansen-api-standard
    name: API Standard
    type: subscription
    description: Standard API plan - 20 rps / 300 rpm.
    entries:
      - label: Custom pricing
        name: api_standard_custom
        type: subscription
        metric: contract
        limit: -1
        timeFrame: contract
        geo: global
        unit: 1
        price: contact sales
        userMultiplied: false
      - label: Rate limit (per second)
        name: api_standard_rps
        type: quota
        metric: requests_per_second
        limit: 20
        timeFrame: second
        geo: global
        unit: 1
        price: '0.00'
        userMultiplied: false
    elements:
      - name: All standard endpoints
      - name: Smart Money, Profiler, Screener
  - id: nansen-api-enterprise
    name: API Enterprise
    type: enterprise
    description: Enterprise API contracts - higher rps, all endpoints, redistribution rights.
    entries:
      - label: Custom pricing
        name: api_enterprise_custom
        type: subscription
        metric: contract
        limit: -1
        timeFrame: contract
        geo: global
        unit: 1
        price: contact sales
        userMultiplied: false
    elements:
      - name: Higher rate limits
      - name: Hyperliquid, Agent, Prediction Markets
      - name: Redistribution rights
maintainers:
  - FN: Kin Lane
    email: kin@apievangelist.com
