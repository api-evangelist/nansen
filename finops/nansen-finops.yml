meters:
  - name: subscription
    description: Monthly API subscription per key.
    unit: month
    aggregation: sum
    dimensions:
      - api_key
principles:
  - name: Visibility
    description: Tag each API key to a single owning workload.
  - name: Allocation
    description: Allocate subscription across consuming product lines.
  - name: Optimization
    description: Drop redundant Studio seats if API consumers can serve the same dashboard need.
  - name: Accountability
    description: Assign a billing owner; review quarterly.
